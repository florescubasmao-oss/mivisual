<script>

async function login() {

const correo = document.getElementById("correo").value.trim();
const clave = document.getElementById("clave").value.trim();

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpVkCmSvopgPByWsEX6nkuAT6mf3yD2_Cywpl9pFSZEqYpxmprDePPeV0KNgT14YpEP6gkVlvOAtZy/pub?gid=0&single=true&output=csv";

const respuesta = await fetch(url);
const texto = await respuesta.text();

const filas = texto.split("\n");

for(let i=1; i<filas.length; i++){

const datos = filas[i].split(",");

const correoSheet = datos[1]?.replace(/"/g,"").trim();
const claveSheet = datos[2]?.replace(/"/g,"").trim();

if(correo === correoSheet && clave === claveSheet){

const cuadrilla = datos[3];
const sede = datos[4];
const plataforma = datos[5];

  localStorage.setItem("cuadrilla", cuadrilla);
localStorage.setItem("sede", sede);
localStorage.setItem("plataforma", plataforma);

document.getElementById("usuarioInfo").innerHTML =
"✅ " + cuadrilla +
"<br>🏢 " + sede +
"<br>📡 " + plataforma;

document.getElementById("panelLogin").style.display = "none";

document.getElementById("btnInicio").style.display = "inline-block";

document.getElementById("menuPrincipal").style.display = "grid";

return;
}

}

document.getElementById("usuarioInfo").innerHTML =
"❌ Correo o clave incorrecta";

}

</script>
 
<script>
async function mostrarProduccion() {

const cuadrilla = localStorage.getItem("cuadrilla");

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpVkCmSvopgPByWsEX6nkuAT6mf3yD2_Cywpl9pFSZEqYpxmprDePPeV0KNgT14YpEP6gkVlvOAtZy/pub?gid=463676034&single=true&output=csv";

const respuesta = await fetch(url);
const texto = await respuesta.text();

const filas = texto.split("\n");
const encabezado = filas[0];
const datosFilas = filas.slice(1).reverse();

filas.length = 0;
filas.push(encabezado, ...datosFilas);
  
const encabezados = filas[0].split(",");

let resultado = `

<h3>📊 PRODUCCIÓN</h3>
`;
  
let totalUltimaMilla = 0;
let totalRecableadoVT = 0;
let totalInstalaciones = 0;
  
for(let i=1; i<filas.length; i++){

const datos = filas[i].split(",");

if(datos[2] && datos[2].trim() === cuadrilla.trim()){

  let puntosDia = 0;

totalUltimaMilla += Number(datos[5]) || 0;
totalInstalaciones += Number(datos[15]) || 0;
totalRecableadoVT += Number(datos[21]) || 0;

let detalle = "";

for(let j = 5; j < datos.length; j++){

   let valor = Number(datos[j]);

  if(j == 5) puntosDia += valor * 1;
if(j == 6) puntosDia += valor * 1;
if(j == 7) puntosDia += valor * 1;
if(j == 8) puntosDia += valor * 1;
if(j == 9) puntosDia += valor * 1;
if(j == 10) puntosDia += valor * 1;
if(j == 11) puntosDia += valor * 1;
if(j == 12) puntosDia += valor * 1;
if(j == 13) puntosDia += valor * 1;

if(j == 14) puntosDia += valor * 1.5;

if(j == 15) puntosDia += valor * 2;

if(j == 16) puntosDia += valor * 1;

if(j == 17) puntosDia += valor * 1;

if(j == 18) puntosDia += valor * 2;

if(j == 19) puntosDia += valor * 2;

if(j == 20) puntosDia += valor * 2.5;

if(j == 21) puntosDia += valor * 2;

if(j == 22) puntosDia += valor * 1;

if(j == 23) puntosDia += valor * 2;

if(j == 24) puntosDia += valor * 2;

   if(valor > 0){

      detalle += `
      <div style="margin:5px 0;">
      ${encabezados[j]}: <b>${valor}</b>
      </div>
      `;
   }
}

  let semaforo = "🔴 SIN BONO";

if(puntosDia >= 4.5){
   semaforo = "🟢 BONO GANADO";
}
else if(puntosDia == 4){
   semaforo = "🟡 CERCA AL BONO";
}

resultado += `
<div style="
background:#1f2d48;
padding:15px;
margin:10px 0;
border-radius:10px;
">

<h4>📅 ${datos[4]}</h4>

<div style="
font-size:18px;
font-weight:bold;
margin:10px 0;
">
${semaforo}
</div>

⭐ Puntos: <b>${puntosDia}</b>

<br><br>

🏠 <b>${datos[2]}</b>

<hr>

${detalle}

</div>
`;
}
}
resultado =
`
<div style="
background:#16a34a;
padding:15px;
margin-bottom:15px;
border-radius:10px;
color:white;
font-weight:bold;
">

📊 RESUMEN DEL MES

<br><br>

🔧 Última Milla: ${totalUltimaMilla}<br>
🏠 Instalaciones: ${totalInstalaciones}<br>
📡 Recableado VT: ${totalRecableadoVT}

</div>
`
+ resultado;
  
document.getElementById("resultadoProduccion").innerHTML = resultado;
  
}

async function mostrarEfectividad(){

const cuadrilla = localStorage.getItem("cuadrilla");

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpVkCmSvopgPByWsEX6nkuAT6mf3yD2_Cywpl9pFSZEqYpxmprDePPeV0KNgT14YpEP6gkVlvOAtZy/pub?gid=1731471693&single=true&output=csv";

const respuesta = await fetch(url);
const texto = await respuesta.text();

const filas = texto.split("\n");

const encabezado = filas[0];
const datosFilas = filas.slice(1).reverse();

filas.length = 0;
filas.push(encabezado, ...datosFilas);

let totalFinalizadas = 0;
let totalGeneral = 0;

let resultado = `

<h3>🎯 EFECTIVIDAD</h3>
`;

for(let i=1; i<filas.length; i++){

const datos = filas[i].split(",");

if(datos[2] && datos[2].trim() === cuadrilla.trim()){

let finalizadas = Number(datos[4]) || 0;
let canceladas = Number(datos[5]) || 0;
let regestion = Number(datos[6]) || 0;
let reprogramado = Number(datos[7]) || 0;
let total = Number(datos[8]) || 0;

let efectividad = 0;

if(total > 0){
efectividad = (finalizadas / total) * 100;
}

totalFinalizadas += finalizadas;
totalGeneral += total;

let semaforo = "🔴";

if(efectividad >= 80){
semaforo = "🟢";
}
else if(efectividad >= 70){
semaforo = "🟡";
}

resultado += `
<div style="
background:#1f2d48;
padding:15px;
margin:10px 0;
border-radius:10px;
">

<h4>📅 ${datos[3]}</h4>

<div style="font-size:20px;font-weight:bold;">
${semaforo} ${efectividad.toFixed(2)}%
</div>

<hr>

✅ Finalizadas: ${finalizadas}<br>
❌ Canceladas: ${canceladas}<br>
🔄 Regestión: ${regestion}<br>
📆 Reprogramado: ${reprogramado}

</div>
`;
}
}

let efectividadMes = 0;

if(totalGeneral > 0){
efectividadMes = (totalFinalizadas / totalGeneral) * 100;
}

let colorMes = "🔴";

if(efectividadMes >= 80){
colorMes = "🟢";
}
else if(efectividadMes >= 70){
colorMes = "🟡";
}

resultado =
`
<div style="
background:#16a34a;
padding:15px;
margin-bottom:15px;
border-radius:10px;
color:white;
font-weight:bold;
">

🎯 RESUMEN DEL MES

<br><br>

${colorMes} Efectividad: ${efectividadMes.toFixed(2)}%

</div>
`
+ resultado;

document.getElementById("resultadoProduccion").innerHTML = resultado;

}
