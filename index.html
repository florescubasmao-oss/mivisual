<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI VISUAL</title>

<style>
body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.header{
background:#0078ff;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.subtitulo{
text-align:center;
padding:10px;
font-size:14px;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.card:hover{
background:#2563eb;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#111827;
padding:10px;
text-align:center;
font-size:12px;
}

  .login-box{
  width:90%;
  max-width:500px;
  margin:20px auto;
  text-align:center;
}

.login-box input{
  width:40%;
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}

.login-box button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#1e88e5;
  color:white;
  cursor:pointer;
}

#usuarioInfo{
  margin-top:10px;
  font-size:14px;
  font-weight:bold;
}
  
</style>

</head>

<body>

<div class="header">
MI VISUAL
</div>

<div class="subtitulo">
Plataforma Operativa Zona Norte
  
</div>
<div class="login-box">
  <input type="email" id="correo" placeholder="Correo">
  <input type="password" id="clave" placeholder="Clave">
  <button onclick="login()">Ingresar</button>

  <div id="usuarioInfo"></div>
  <div id="resultadoProduccion"></div>
</div>
<div class="menu" id="menuPrincipal" style="display:none;">

<div class="card" onclick="mostrarProduccion()">

📊 PRODUCCIÓN

</div>

<div class="card">
🎯 EFECTIVIDAD
</div>

<div class="card">
🔧 % RECABLEADO
</div>

<div class="card">
📈 % VTR / GAR
</div>

<div class="card">
🏆 RANKING
</div>

<div class="card">
📚 BIBLIOTECA
</div>

<div class="card">
🤖 BOTS
</div>

<div class="card">
🎥 TUTORIALES
</div>

</div>

<div class="footer">
Visual Connections SAC - Zona Norte
</div>
<script>

async function login() {

const correo = document.getElementById("correo").value.trim();
const clave = document.getElementById("clave").value.trim();

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpVkCmSvopgPByWsEX6nkuAT6mf3yD2_Cywpl9pFSZEqYpxmprDePPeV0KNgT14YpEP6gkVlvOAtZy/pub?gid=0&single=true&output=csv";

const respuesta = await fetch(url);
const texto = await respuesta.text();

const filas = texto.split("\n");

for(let i=1; i<filas.length; i++){

const datos = filas[i].split(",");

const correoSheet = datos[1]?.replace(/"/g,"").trim();
const claveSheet = datos[2]?.replace(/"/g,"").trim();

if(correo === correoSheet && clave === claveSheet){

const cuadrilla = datos[3];
const sede = datos[4];
const plataforma = datos[5];

  localStorage.setItem("cuadrilla", cuadrilla);
localStorage.setItem("sede", sede);
localStorage.setItem("plataforma", plataforma);

document.getElementById("usuarioInfo").innerHTML =
"✅ " + cuadrilla +
"<br>🏢 " + sede +
"<br>📡 " + plataforma;

 document.getElementById("menuPrincipal").style.display = "grid";

return;
}

}

document.getElementById("usuarioInfo").innerHTML =
"❌ Correo o clave incorrecta";

}

</script>
  <script>

async function mostrarProduccion(){

const cuadrilla = localStorage.getItem("cuadrilla");

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpVkCmSvopgPByWsEX6nkuAT6mf3yD2_Cywpl9pFSZEqYpxmprDePPeV0KNgT14YpEP6gkVlvOAtZy/pub?gid=463676034&single=true&output=csv";

const respuesta = await fetch(url);
const texto = await respuesta.text();
  console.log(texto);
alert("CSV cargado");

const filas = texto.split("\n");
const encabezados = filas[0].split(",");

let resultado = `
<div style="
background:#1f2d48;
padding:20px;
margin:20px;
border-radius:12px;
color:white;
">
<h2>📊 PRODUCCIÓN</h2>
`;

for(let i=1;i<filas.length;i++){

const datos = filas[i].split(",");

if(datos[2] && datos[2].trim() === cuadrilla.trim()){


let detalle = "";

for(let j = 5; j < datos.length; j++){

  let valor = Number(datos[j]);

  if(valor > 0){

    detalle += `
    <div style="margin:5px 0;">
      ${encabezados[j]}: <b>${valor}</b>
    </div>
    `;
  }

}

resultado += `
<hr>

📅 ${datos[4]}<br><br>

${detalle}
`;

}

resultado += "</div>";

document.getElementById("resultadoProduccion").innerHTML = resultado;

}

</script>
</body>
</html>
